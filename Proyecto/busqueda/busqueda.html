<!DOCTYPE html>
<html lang="es">
<!-- Favicon personalizado -->
<link rel="icon" type="image/png" href="img/favicon_espe.jpg">  
<head>
    <meta charset="UTF-8">
    <title>Búsqueda</title>
    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/busqueda.css">
</head>
<body>
    <!-- Encabezado institucional -->
    <header>
        <h2>Formulario de Búsqueda</h2>
    </header>

    <!-- Contenido principal -->
    <main>
        <form action="#" method="get">
            <label>Ingrese palabra clave:</label><br><br>
            <input type="text" name="keyword" required>
            <br><br>
            <button type="submit">Buscar</button>
        </form>
        <br>
        <a href="index.html">Volver a la página principal</a>

        <!-- Nueva sección de datos -->
        <section id="datos">
            <h2>Datos simulados</h2>
            <p>La información de este formulario está representada en los archivos 
               <code>data/datos.json</code> y <code>data/datos.xml</code>.</p>

            <!-- Tabla de relación interfaz-datos -->
            <table>
                <thead>
                    <tr>
                        <th>Elemento de la interfaz</th>
                        <th>Campo JSON/XML</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Palabra clave</td>
                        <td>Fundamentos</td>
                    </tr>
                    <tr>
                        <td>Estado del formulario</td>
                        <td>Activo</td>
                    </tr>
                    <tr>
                        <td>Imagen asociada</td>
                        <td>imagen</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
