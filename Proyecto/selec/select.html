<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seleccione</title>
    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/general.css">
</head>
<body style="background-color:#e6ffe6; font-family:Arial; text-align:center;">
    <header style="background-color:#006400; color:white; padding:15px;">
        <h2>Formulario con Select</h2>
    </header>

    <main style="margin-top:30px;">
        <form action="#" method="post">
            <label>Seleccione su carrera:</label><br><br>
            <select name="carrera" required>
                <option value="">Seleccione...</option>
                <option value="TI">Tecnología de la Información</option>
                <option value="Electrónica">Electrónica</option>
                <option value="Mecánica">Mecánica</option>
                <option value="Civil">Civil</option>
            </select>
            <br><br>
            <button type="submit">Enviar</button>
        </form>
        <br>
        <a href="index.html" style="color:#006400;">Volver a la página principal</a>
    </main>
</body>
</html>
