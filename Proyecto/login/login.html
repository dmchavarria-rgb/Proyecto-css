<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion</title>
</head>
<body style="background-color:#e6ffe6; font-family:Arial; text-align:center;">
    <header style="background-color:#006400; color:white; padding:15px;">
        <h2>Formulario de Inicio de Sesion</h2>
    </header>

    <main style="margin-top:30px;">
        <form action="#" method="post">
            <label>Usuario:</label><br>
            <input type="text" name="usuario" required><br><br>
            <label>Contraseña:</label><br>
            <input type="password" name="clave" pattern="[A-Za-z0-9@#$%^&+=]{8,16}" title="Debe tener entre 8 y 16 caracteres con letras, números y símbolos." required><br><br>
            <button type="submit">Ingresar</button>
        </form>
        <br>
        <a href="index.html" style="color:#006400;">Volver a la página principal</a>
    </main>
</body>
</html>
