<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checkbox</title>
    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="css/general.css">
</head>
<body style="background-color:#e6ffe6; font-family:Arial; text-align:center;">
    <header style="background-color:#006400; color:white; padding:15px;">
        <h2>Intereses</h2>
    </header>

    <main style="margin-top:30px;">
        <form action="#" method="post">
            <p>Seleccione sus intereses:</p>
            <input type="checkbox" name="interes" value="Programación"> Programación<br>
            <input type="checkbox" name="interes" value="Redes"> Redes<br>
            <input type="checkbox" name="interes" value="Seguridad"> Seguridad<br>
            <input type="checkbox" name="interes" value="Bases de Datos"> Bases de Datos<br><br>
            <button type="submit">Registrar</button>
        </form>
        <br>
        <a href="index.html" style="color:#006400;">Volver a la página principal</a>
    </main>
</body>
</html>
